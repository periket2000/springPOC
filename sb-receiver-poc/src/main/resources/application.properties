server.port=${PORT:8082}

azure.servicebus.connection-string=${AZURE_SERVICEBUS_CONNECTION_STRING:}

# Destinos definidos con clave simple (sin corchetes)
azure.servicebus.queues.q1.name=${QUEUE1}
azure.servicebus.queues.q2.name=${QUEUE2}
azure.servicebus.topics.t1.name=${TOPIC1}
azure.servicebus.topics.t1.subscription=${SUB1}

# El handler se resuelve por convencion: {id}Handler con id saneado
#   q1 -> bean q1Handler
#   q2 -> bean q2Handler
#   t1 -> bean t1Handler
# Si no existe el bean, se usa DefaultMessageHandler (imprime el mensaje)

# Podemos lanzarlo como
# docker run -p 8083:8082 -e AZURE_SERVICEBUS_CONNECTION_STRING="Endpoint=sb://..." -e QUEUE1=vms-videodownload-q-devm -e QUEUE2=vms-videodownload-q -e TOPIC1=vms-videoevents-test-t -e SUB1=vms sb-receiver-poc:latest
